# Pytest: feed smoke tests and mocked pipeline. Not part of the daily email workflow.
name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8.0.0"

      - name: Run pytest
        run: pytest
