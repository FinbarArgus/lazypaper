name: Daily paper email

on:
  schedule:
    # Must match `SCHEDULE_CRON` in `config.py` at repo root (edit SCHEDULE_MINUTE_UTC / SCHEDULE_HOUR_UTC there).
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate email and feed domains
        env:
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          LAZYPAPER_TO: ${{ secrets.LAZYPAPER_TO }}
        run: python scripts/check_domains.py

      - name: Run lazypaper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m lazypaper

      - name: Commit sent articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json
          git diff --staged --quiet || (git commit -m "chore: update sent articles" && git push)
