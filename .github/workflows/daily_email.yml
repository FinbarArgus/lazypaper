name: Daily paper email

on:
  schedule:
    # 04:00 NZST (UTC+12) ≈ 16:00 UTC previous calendar day. During NZDT (UTC+13), same UTC time is 05:00 local.
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lazypaper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: python main.py

      - name: Commit sent articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json
          git diff --staged --quiet || (git commit -m "chore: update sent articles" && git push)
