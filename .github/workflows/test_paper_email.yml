# Manual: Actions → "Run workflow", or: gh workflow run test_paper_email.yml
name: Test paper email

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send one paper email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m lazypaper

      - name: Commit sent articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json
          git diff --staged --quiet || (git commit -m "chore: update sent articles" && git push)
