# Manual: Actions → "Run workflow", or: gh workflow run test_paper_email.yml
name: Test paper email

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate email and feed domains
        env:
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          LAZYPAPER_TO: ${{ secrets.LAZYPAPER_TO }}
        run: python scripts/check_domains.py

      - name: Send one paper email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          LAZYPAPER_TO: ${{ secrets.LAZYPAPER_TO }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m lazypaper

      - name: Persist sent history
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add sent_emails.db
          if git diff --cached --quiet; then
            echo "No sent history changes to commit"
            exit 0
          fi
          git commit -m "Update sent email history"
          git push
